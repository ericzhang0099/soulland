version: '3.8'

# GenLoop 3.0 - 单服务器部署 (Sophia 测试网)
# 使用公共 RPC，无需自建区块链节点

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: genloop-postgres
    environment:
      POSTGRES_USER: genloop
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: genloop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genloop"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: genloop-redis
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: always
    command: redis-server --appendonly yes

  # 后端 API
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: genloop-api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://genloop:${DB_PASSWORD:-changeme}@postgres:5432/genloop
      - REDIS_URL=redis://redis:6379
      # Sophia 测试网配置
      - SOPHIA_RPC_URL=https://testnet.sophia.network/rpc
      - SOPHIA_CHAIN_ID=97
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    volumes:
      - ../apps/api:/app
      - /app/node_modules

  # 前端
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: genloop-web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3000
      - NEXT_PUBLIC_SOPHIA_CHAIN_ID=97
    ports:
      - "3001:3000"
    depends_on:
      - api
    restart: always

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: genloop-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-single.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - web
    restart: always

volumes:
  postgres_data:
  redis_data:
