version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: genloop-postgres
    environment:
      POSTGRES_USER: genloop
      POSTGRES_PASSWORD: genloop123
      POSTGRES_DB: genloop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: genloop-redis
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

volumes:
  postgres_data:
  redis_data:
