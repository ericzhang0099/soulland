appId: com.genloop.desktop
productName: GenLoop Desktop
copyright: Copyright © 2026 GenLoop Team

directories:
  output: dist-electron
  buildResources: build

files:
  - dist/**/*
  - dist-electron/main/**/*
  - dist-electron/preload/**/*

extraResources:
  - from: node_modules/puppeteer-core/.local-chromium
    to: chromium
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "**/*.node"
  - node_modules/puppeteer-core/**/*

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  publisherName: GenLoop Team
  verifyUpdateCodeSignature: false
  requestedExecutionLevel: requireAdministrator
  signAndEditExecutable: false
  
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: GenLoop Desktop
  uninstallDisplayName: GenLoop Desktop
  license: LICENSE.txt
  artifactName: GenLoop-Desktop-Setup-${version}-${arch}.${ext}
  deleteAppDataOnUninstall: false
  displayLanguageSelector: true
  
portable:
  artifactName: GenLoop-Desktop-Portable-${version}-${arch}.${ext}

# macOS 配置
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

# Linux 配置
linux:
  target:
    - AppImage
    - deb
    - rpm
  icon: build/icon.png
  category: Utility

# 发布配置
publish:
  provider: github
  owner: ericzhang0099
  repo: soulland

# 协议注册
protocols:
  - name: GenLoop
    schemes:
      - genloop
